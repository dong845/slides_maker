<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>slide-maker — flip through real generated decks</title>
<script src="decks.js"></script>
<style>
:root { --ink:#1f2430; --paper:#fbfaf7; --mute:#8a8f9a; --accent:#c2410c; --line:#e3e0d8; --card:#ffffff; }
* { box-sizing:border-box; }
body { margin:0; background:var(--paper); color:var(--ink);
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif; }
.wrap { max-width:1160px; margin:0 auto; padding:40px 24px 80px; }
h1 { font-size:30px; margin:0 0 8px; }
h1 .dot { color:var(--accent); }
.sub { color:var(--mute); margin:0 0 6px; font-size:15px; line-height:1.6; }
.links { margin:14px 0 6px; font-size:14px; }
.links a { color:var(--accent); text-decoration:none; font-weight:600; margin-right:18px; }
.links a:hover { text-decoration:underline; }
.toggle { display:inline-flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin:22px 0 6px; }
.toggle button { border:0; background:var(--card); color:var(--mute); padding:8px 22px; font-size:14px; cursor:pointer; font-weight:600; }
.toggle button.on { background:var(--ink); color:#fff; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:22px; margin-top:22px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;
  box-shadow:0 4px 18px rgba(31,36,48,.05); display:flex; flex-direction:column; }
.card a.cover { display:block; line-height:0; }
.card img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; }
.meta { padding:14px 16px 16px; display:flex; flex-direction:column; gap:6px; flex:1; }
.meta .name { font-weight:700; font-size:15.5px; }
.meta .use { color:var(--mute); font-size:13px; line-height:1.5; flex:1; }
.meta .row { display:flex; gap:14px; font-size:13.5px; margin-top:4px; }
.meta .row a { color:var(--accent); text-decoration:none; font-weight:600; }
.meta .row a:hover { text-decoration:underline; }
footer { margin-top:56px; color:var(--mute); font-size:13px; line-height:1.7; border-top:1px solid var(--line); padding-top:18px; }
footer a { color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>slide-maker<span class="dot">.</span></h1>
  <p class="sub" id="sub1"></p>
  <p class="sub" id="sub2"></p>
  <div class="links" id="links"></div>

  <div class="toggle" role="tablist">
    <button id="btn-en" class="on" onclick="setLang('en')">English decks</button>
    <button id="btn-zh" onclick="setLang('zh')">中文 decks</button>
  </div>

  <div class="grid" id="grid"></div>

  <footer id="footer"></footer>
</div>
<script>
const REPO = 'https://github.com/addsum-comp/slides_maker';
const STR = {
  en: {
    sub1: 'A skill for Codex and Claude Code that turns papers, code, and documents into natively editable PPTX. Every deck below was generated by it: real text boxes, native charts, editable math, speaker notes, click builds.',
    sub2: 'Flip through a deck online, or download the .pptx and click around in PowerPoint. That is the honest test.',
    links: `<a href="${REPO}">GitHub</a><a href="${REPO}#quick-start">Quick start</a><a href="${REPO}#how-to-use-the-templates">Use these as templates</a>`,
    footer: `Generated with <a href="${REPO}">slide-maker</a> in Codex / Claude Code. Each deck ships as <code>template.pptx</code> plus a style profile under <code>templates/decks/</code>, so you can reuse any of them as a template for your own material. MIT licensed.`,
    pages: 'pages', flip: 'Flip online', dl: 'Download .pptx',
    title: 'slide-maker \u2014 flip through real generated decks',
  },
  zh: {
    sub1: '\u4e00\u4e2a\u7ed9 Codex \u548c Claude Code \u7528\u7684 skill\uff1a\u628a\u8bba\u6587\u3001\u4ee3\u7801\u548c\u6587\u6863\u53d8\u6210\u539f\u751f\u53ef\u7f16\u8f91\u7684 PPTX\u3002\u4e0b\u9762\u6bcf\u4e00\u5957\u90fd\u662f\u5b83\u751f\u6210\u7684\uff1a\u771f\u6587\u672c\u6846\u3001\u539f\u751f\u56fe\u8868\u3001\u53ef\u7f16\u8f91\u516c\u5f0f\u3001\u9010\u9875\u8bb2\u7a3f\u3001\u70b9\u51fb\u6e10\u663e\u3002',
    sub2: '\u5728\u7ebf\u7ffb\u4e00\u904d\uff0c\u6216\u4e0b\u8f7d .pptx \u5728 PowerPoint \u91cc\u70b9\u4e24\u4e0b\u3002\u8fd9\u624d\u662f\u6700\u8bda\u5b9e\u7684\u68c0\u9a8c\u3002',
    links: `<a href="${REPO}">GitHub</a><a href="${REPO}/blob/main/README_CN.md">\u5feb\u901f\u5f00\u59cb</a><a href="${REPO}/blob/main/README_CN.md#\u6a21\u677f\u600e\u4e48\u7528">\u628a\u5b83\u4eec\u5f53\u6a21\u677f\u7528</a>`,
    footer: `\u7531 <a href="${REPO}">slide-maker</a> \u5728 Codex / Claude Code \u91cc\u751f\u6210\u3002\u6bcf\u5957\u90fd\u4ee5 <code>template.pptx</code> \u52a0\u98ce\u683c\u6863\u6848\u7684\u5f62\u5f0f\u653e\u5728 <code>templates/decks/</code> \u4e0b\uff0c\u53ef\u76f4\u63a5\u62ff\u53bb\u5f53\u4f60\u81ea\u5df1\u5185\u5bb9\u7684\u6a21\u677f\u3002MIT \u534f\u8bae\u5f00\u6e90\u3002`,
    pages: '\u9875', flip: '\u5728\u7ebf\u7ffb\u9875', dl: '\u4e0b\u8f7d .pptx',
    title: 'slide-maker \u2014 \u5728\u7ebf\u7ffb\u9605\u771f\u5b9e\u751f\u6210\u7684 PPT',
  },
};
function card(d, t) {
  const cover = `templates/decks/${d.id}/render/slide01.png`;
  const view = `viewer.html?deck=${encodeURIComponent(d.id)}`;
  const dl = `templates/decks/${d.id}/template.pptx`;
  return `<div class="card">
    <a class="cover" href="${view}"><img loading="lazy" src="${cover}" alt="${d.title} preview"></a>
    <div class="meta">
      <div class="name">${d.title}</div>
      <div class="use">${d.use} \u00b7 ${d.pages} ${t.pages}</div>
      <div class="row"><a href="${view}">${t.flip}</a><a href="${dl}" download>${t.dl}</a></div>
    </div>
  </div>`;
}
function setLang(lang) {
  const t = STR[lang];
  if (history.replaceState) history.replaceState(null, '', lang === 'zh' ? '#zh' : '#en');
  document.getElementById('btn-en').classList.toggle('on', lang === 'en');
  document.getElementById('btn-zh').classList.toggle('on', lang === 'zh');
  document.getElementById('sub1').textContent = t.sub1;
  document.getElementById('sub2').textContent = t.sub2;
  document.getElementById('links').innerHTML = t.links;
  document.getElementById('footer').innerHTML = t.footer;
  document.title = t.title;
  document.documentElement.lang = (lang === 'zh') ? 'zh-CN' : 'en';
  document.getElementById('grid').innerHTML =
    (window.DECKS || []).filter(d => d.lang === lang).map(d => card(d, t)).join('');
}
setLang(location.hash === '#zh' ? 'zh' : 'en');
</script>
</body>
</html>
