<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>slide-maker — deck viewer</title>
<link rel="icon" type="image/png" href="favicon.png">
<script src="decks.js"></script>
<style>
:root { --ink:#1f2430; --paper:#fbfaf7; --mute:#8a8f9a; --accent:#c2410c; --accent-deep:#9a3410;
  --line:#e3e0d8; --tint:#faece3; }
* { box-sizing:border-box; }
body { margin:0; background:var(--paper); color:var(--ink);
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", sans-serif;
  min-height:100vh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }

header { display:flex; align-items:center; gap:14px; padding:12px 22px; border-bottom:1px solid var(--line);
  background:rgba(251,250,247,.92); backdrop-filter:blur(8px); position:sticky; top:0; z-index:10; }
header .logo { width:26px; height:26px; border-radius:6px; }
header a.back { color:var(--accent); text-decoration:none; font-weight:700; font-size:14px; white-space:nowrap; }
header .title { font-weight:800; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
header .spacer { flex:1; }
header a.dl { color:#fff; background:var(--ink); padding:8px 16px; border-radius:9px;
  text-decoration:none; font-size:13px; font-weight:700; white-space:nowrap; transition:background .15s; }
header a.dl:hover { background:var(--accent); }
.progress { height:3px; background:var(--line); }
.progress i { display:block; height:100%; background:linear-gradient(90deg, var(--accent), #d97b2f);
  width:0; transition:width .25s ease; }

main { flex:1; display:flex; align-items:center; justify-content:center; padding:22px 64px; position:relative; }
.stage { position:relative; max-width:1080px; width:100%; }
.stage img { width:100%; display:block; border:1px solid var(--line); border-radius:12px;
  background:#fff; box-shadow:0 14px 44px rgba(31,36,48,.12); }
.hot { position:absolute; top:0; bottom:0; width:50%; cursor:pointer; }
.hot.prev { left:0; } .hot.next { right:0; }
.arrow { position:absolute; top:50%; transform:translateY(-50%); width:46px; height:46px; border-radius:50%;
  border:1px solid var(--line); background:#fff; color:var(--ink); font-size:19px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(31,36,48,.12);
  transition:all .15s ease; user-select:none; z-index:5; }
.arrow:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-50%) scale(1.06); }
.arrow.prev { left:-58px; } .arrow.next { right:-58px; }
.arrow[disabled] { opacity:.3; pointer-events:none; }

.deckbar { display:flex; align-items:center; justify-content:center; gap:14px; padding:14px 20px 6px; }
.count { font-variant-numeric:tabular-nums; color:var(--mute); font-size:13.5px; min-width:64px; text-align:center; font-weight:600; }
.pips { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:70vw; }
.pips b { width:8px; height:8px; border-radius:50%; background:#d9d4c8; cursor:pointer; transition:all .15s; }
.pips b:hover { background:var(--mute); }
.pips b.on { background:var(--accent); transform:scale(1.25); }

.usebar { display:flex; align-items:center; justify-content:center; gap:10px; padding:10px 20px 26px; flex-wrap:wrap; }
.usebar .lbl { color:var(--mute); font-size:12.5px; }
.usebar code { background:var(--ink); color:#f2efe7; border-radius:8px; padding:7px 12px;
  font-family:ui-monospace, "SF Mono", Menlo, monospace; font-size:12px; max-width:72vw;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.usebar button { border:1.5px solid var(--line); background:#fff; color:var(--ink); border-radius:8px;
  padding:6px 13px; font-size:12.5px; font-weight:700; cursor:pointer; }
.usebar button:hover { border-color:var(--accent); color:var(--accent); }

.hint { text-align:center; color:var(--mute); font-size:12px; padding-bottom:18px; }
.err { text-align:center; padding:80px 20px; color:var(--mute); }
.err a { color:var(--accent); }

@media (max-width:860px) {
  main { padding:16px 14px; }
  .arrow.prev { left:8px; } .arrow.next { right:8px; }
  .arrow { opacity:.85; }
  .usebar code { display:none; }
}
</style>
</head>
<body>
<header>
  <img class="logo" src="logo-160.png" alt="">
  <a class="back" href="index.html">&larr; Gallery</a>
  <div class="title" id="deckTitle">slide-maker deck</div>
  <div class="spacer"></div>
  <a class="dl" id="dlBtn" href="#" download>Download .pptx</a>
</header>
<div class="progress"><i id="prog"></i></div>

<main>
  <div class="stage" id="stage">
    <img id="slide" src="" alt="slide">
    <div class="hot prev" onclick="go(-1)"></div>
    <div class="hot next" onclick="go(1)"></div>
    <button class="arrow prev" id="aPrev" onclick="go(-1)" aria-label="Previous">&larr;</button>
    <button class="arrow next" id="aNext" onclick="go(1)" aria-label="Next">&rarr;</button>
  </div>
</main>

<div class="deckbar">
  <div class="count" id="count">–</div>
  <div class="pips" id="pips"></div>
</div>

<div class="usebar">
  <span class="lbl" id="useLbl"></span>
  <code id="useCmd"></code>
  <button id="copyBtn"></button>
</div>
<div class="hint" id="hint"></div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('deck') || 'en/transformer-talk';
const deck = (window.DECKS || []).find(d => d.id === id);
let page = 1;

function pad(n) { return String(n).padStart(2, '0'); }
function src(n) { return `templates/decks/${id}/render/slide${pad(n)}.png`; }

function show() {
  document.getElementById('slide').src = src(page);
  document.getElementById('count').textContent = `${page} / ${deck.pages}`;
  document.getElementById('prog').style.width = (page / deck.pages * 100) + '%';
  document.getElementById('aPrev').toggleAttribute('disabled', page <= 1);
  document.getElementById('aNext').toggleAttribute('disabled', page >= deck.pages);
  document.querySelectorAll('.pips b').forEach((b, k) => b.classList.toggle('on', k === page - 1));
  if (page < deck.pages) { const pre = new Image(); pre.src = src(page + 1); }
}
function go(d) { page = Math.min(Math.max(1, page + d), deck.pages); show(); }
function goto(n) { page = n; show(); }

if (!deck) {
  document.querySelector('main').innerHTML =
    '<div class="err">Unknown deck. <a href="index.html">Back to the gallery</a></div>';
  document.querySelector('.deckbar').style.display = 'none';
  document.querySelector('.usebar').style.display = 'none';
} else {
  const zh = deck.lang === 'zh';
  document.getElementById('deckTitle').textContent = `${deck.title}（${zh ? '中文' : 'English'}）`;
  document.title = `${deck.title} — slide-maker`;
  document.documentElement.lang = zh ? 'zh-CN' : 'en';
  document.querySelector('a.back').textContent = zh ? '← 返回画廊' : '← Gallery';
  document.querySelector('a.back').href = zh ? 'index.html#zh' : 'index.html#en';
  document.getElementById('hint').textContent = zh
    ? '方向键翻页，点画面左右半边，或左右滑动。'
    : 'Use arrow keys, click the left / right half of the slide, or swipe.';
  const dl = document.getElementById('dlBtn');
  dl.textContent = zh ? '下载 .pptx' : 'Download .pptx';
  dl.href = `templates/decks/${id}/template.pptx`;

  const pips = document.getElementById('pips');
  for (let n = 1; n <= deck.pages; n++) {
    const b = document.createElement('b');
    b.onclick = () => goto(n);
    b.title = n;
    pips.appendChild(b);
  }

  const cmd = zh
    ? `用 slide-maker，参考 templates/decks/${id}/template.pptx 的风格，按我的材料做一份 PPT。`
    : `Use slide-maker. Follow the style of templates/decks/${id}/template.pptx and build from my material.`;
  document.getElementById('useLbl').textContent = zh ? '当模板用：' : 'Use as a template:';
  document.getElementById('useCmd').textContent = cmd;
  const cp = document.getElementById('copyBtn');
  cp.textContent = zh ? '复制' : 'Copy';
  cp.onclick = () => {
    navigator.clipboard.writeText(cmd).then(() => {
      cp.textContent = zh ? '已复制 ✓' : 'Copied ✓';
      setTimeout(() => { cp.textContent = zh ? '复制' : 'Copy'; }, 1600);
    });
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') go(1);
    if (e.key === 'ArrowLeft') go(-1);
    if (e.key === 'Home') goto(1);
    if (e.key === 'End') goto(deck.pages);
  });
  let x0 = null;
  const stage = document.getElementById('stage');
  stage.addEventListener('touchstart', e => { x0 = e.touches[0].clientX; }, {passive:true});
  stage.addEventListener('touchend', e => {
    if (x0 === null) return;
    const dx = e.changedTouches[0].clientX - x0;
    if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
    x0 = null;
  }, {passive:true});
  show();
}
</script>
</body>
</html>
